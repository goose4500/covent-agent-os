# Railway worker configuration for the Covent Pi Slack Socket Mode bridge.
# This repo is a monorepo; Railway should build from the repo root and start apps/pi-mom.
# Socket Mode is a long-running websocket worker, not an HTTP/serverless function.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run dev:pi-mom"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
