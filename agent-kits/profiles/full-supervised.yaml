name: full-supervised
description: Legacy safe-mode full supervised operator profile for broad local work with explicit approval gates.
tools: [read, grep, find, ls, bash, edit, write, mcp, web_search, fetch_content, get_search_content, contact_supervisor]
skills: [git-workflow, diagnose, context7-docs, systems-thinking]
extensions: [permission-gate, env-guard, git-checkpoint, slack-mcp-guard, linear-mcp-guard]
runtime: supervised-local
allowShell: true
allowWrites: true
allowExternalMutation: true
approval: supervisor-required-for-external-mutation-push-or-deploy
forbiddenFromSlack: [secrets, credentials, tokens, raw-private-exports]
