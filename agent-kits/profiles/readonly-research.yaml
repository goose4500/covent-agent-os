name: readonly-research
description: Legacy safe-mode read-only research profile for repo and external documentation lookup.
tools: [read, grep, find, ls, web_search, fetch_content, get_search_content, mcp]
skills: [context7-docs, diagnose]
extensions: [permission-gate, env-guard]
runtime: pi
allowShell: false
allowWrites: false
allowExternalMutation: false
approval: required-for-writes-or-external-mutation
forbiddenFromSlack: [secrets, credentials, tokens, raw-private-exports]
