name: deploy-supervised
description: Legacy safe-mode supervised deployment profile for validation and release operations after explicit approval.
tools: [read, grep, find, ls, bash, mcp, contact_supervisor]
skills: [git-workflow, diagnose]
extensions: [permission-gate, env-guard, git-checkpoint]
runtime: supervised-local
allowShell: true
allowWrites: true
allowExternalMutation: true
approval: supervisor-required-before-deploy-or-external-mutation
forbiddenFromSlack: [secrets, credentials, tokens, raw-private-exports]
