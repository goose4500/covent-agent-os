# Railway config for covent-pi-preview: static HTML bundle host fed by the bot
# over *.railway.internal. Public ingress at *.up.railway.app/p/<slug>.

[build]
builder = "NIXPACKS"
buildCommand = "bun install --frozen-lockfile"

[deploy]
startCommand = "bun index.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
