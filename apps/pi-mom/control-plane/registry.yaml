# Agent Actions registry (Slice 1)
#
# This file is the team-facing inventory for pi-mom Actions. It is intentionally
# a single YAML file so future AI agents can read and edit the control-plane
# surface without chasing multiple sources.
#
# How to add an Action:
# 1. Add one entry under `actions` with a stable kebab-case `key`.
# 2. Use `status: planned` until the runtime wiring and tests exist.
# 3. Use `status: active` only when the action is available in the control-plane
#    runtime concept. Active actions must include `runtime` metadata.
# 4. Keep legacy Slack handlers listed under `legacyRoutes` until they are
#    deliberately migrated or retired. Slice 2 wires action metadata into the
#    Agent Run Card without changing execution behavior.

version: 1

actions:
  - key: run-action
    name: Run Action
    description: Confirm and run a bounded agent Action from the control plane.
    status: active
    riskLevel: bounded
    approvalMode: Slack confirmation required before start
    artifacts:
      - Slack thread updates
      - Optional Slack canvas result
    sourceLinks:
      - Slack source thread
    runtime:
      type: control-plane
      entrypoint: run-action
      notes: "Existing agent: route maps to this active Action; execution behavior stays bounded by the configured runner."

  - key: repo-health
    name: Repo Health
    description: Inspect a configured repository worktree and summarize health signals.
    status: planned
    riskLevel: read-only
    approvalMode: Slack confirmation required before start
    artifacts:
      - Repository health summary
      - Slack thread updates
    sourceLinks:
      - Configured local worktree
    runtime:
      type: pi-mom-agent-runner
      entrypoint: repo-health
      notes: Existing legacy runner mode exists, but this Action is not active in the registry/runtime concept yet.

# Per-route tool gating, system prompt suffix, and approval posture for the
# Slack-facing routes that `parseSlackRequestCommand` resolves to. The
# action-resolver maps a parsed command to one of these entries; the SDK
# runner uses `tools` to call `setActiveToolsByName` (empty array = no Pi
# tools active, identical to legacy noTools:"all" posture). `approvals` is
# advisory until the modal gate lands in a later stage.
routes:
  # Unprefixed mentions — give Pi the full default agentic toolset so it can
  # actually do work on the machine. permission-gate intercepts rm -rf /
  # sudo / chmod 777 / chown 777 via a Slack approval modal before the call
  # executes; everything else runs without prompting.
  plain:
    tools: ["bash", "read", "grep", "find", "edit", "write"]
    systemPromptSuffix: ""
    approvals: tool
  help:
    tools: []
    systemPromptSuffix: ""
    approvals: none
  status:
    tools: []
    systemPromptSuffix: ""
    approvals: none
  summarize:
    tools: []
    systemPromptSuffix: "Summarize the current Slack thread into decisions, open questions, owners, risks/blockers, and next actions. Prefer compact bullets and cite Slack timestamps/permalinks if present in context."
    approvals: none
  linear:
    # Linear is driven by the single generic `linear_graphql` Pi custom tool
    # (extensions/linear-graphql.ts). Recipes and policy live in
    # skills/linear-graphql/SKILL.md; mutations are gated by
    # extensions/linear-mcp-guard.ts via the Slack approval modal.
    tools: ["linear_graphql"]
    systemPromptSuffix: "The user wants to track something in Linear. Load the linear-graphql skill (see skills/linear-graphql/SKILL.md) for the GraphQL recipes. First run an IssueSearch query (searchableContent.contains on the most distinctive phrase or proper noun, filter by the configured LINEAR_TEAM_ID) to find duplicates. If a clear match comes back, post a CommentCreate mutation against that issue (Markdown body referencing the Slack thread). Otherwise post an IssueCreate mutation exactly once with: teamId (LINEAR_TEAM_ID), projectId (LINEAR_PROJECT_ID), stateId (LINEAR_STATE_ID), title (single line ≤240 chars), description (Markdown with problem, context, proposed solution/spec, acceptance criteria, priority/severity suggestion, source Slack thread reference, open questions), optional priority (0=none, 1=urgent, 2=high, 3=medium, 4=low). After the final mutation, write a short Slack reply quoting the Linear issue identifier and URL (or comment URL). Never run IssueCreate twice for the same thread."
    approvals: tool
  agenda:
    tools: []
    systemPromptSuffix: "Turn the current Slack context into a meeting agenda. Output: meeting goal, required decisions, agenda items, pre-reads/context, attendee-specific questions if inferable, and desired outcomes."
    approvals: none
  spec:
    tools: []
    systemPromptSuffix: "Convert the Slack idea/context into a concise spec draft. Output: problem, user/customer, proposed solution, non-goals, success criteria, implementation notes, risks, validation plan, and open questions."
    approvals: none
  # Stage 6.5: bash route with the built-in `bash` tool active. The
  # permission-gate inline extension (extensions/permission-gate.ts) gates
  # rm -rf / sudo / chmod 777 / chown 777 by calling
  # ctx.ui.select("Allow?", ["Yes","No"]) which lib/slack-ui-context.mjs
  # translates into Slack approval buttons. Non-dangerous commands run
  # without prompting. Keep this route off in production environments
  # without an approval workflow — restrict to test channels and trusted
  # operators.
  bash:
    tools: ["bash"]
    systemPromptSuffix: "Execute the user's bash command verbatim via the bash tool exactly once. After it returns, summarize the exit code, stdout, and stderr in a single concise paragraph. The permission-gate extension may pause for a Slack approval click before rm -rf / sudo / chmod 777 / chown 777 — that's expected; the gate either resumes or blocks the call based on the user's choice."
    approvals: tool

# Event-triggered routes (issue #48 / ADR-0003). Each entry opts into the
# event-driven runtime via a `trigger:` block. The webhook receiver matches
# incoming events from a `trigger.source` (e.g. linear, github) against the
# `trigger.when` tokens (formatted "<Type>.<action>"), resolves a Slack
# destination via `destination.resolver`, and hands a synthetic Slack turn to
# pi-sdk-runner. Routes WITHOUT a `trigger:` block live in the `routes:` map
# above and continue to behave as Slack-message-only.
eventRoutes:
  # First production loop: a Linear comment lands → Pi posts a structured
  # summary back into the Slack thread captured as a Linear attachment on the
  # parent issue. Exercises both the destination resolver (attachment lookback)
  # and the bounded mutation surface (one chat.postMessage). The integrator in
  # Phase 3 fills in `destination.fallback_channel` with the real
  # #pi-event-runtime channel ID.
  - name: linear-comment-sync
    trigger:
      source: linear
      when: ["Comment.create"]
      idempotency: webhookDelivery
    destination:
      resolver: linear_attachment_thread
      fallback_channel: TBD-CHANNEL-ID
    tools: [linear_graphql, slack_api]
    systemPromptSuffix: |
      You woke up because Linear emitted a Comment.create event.
      The event payload is in the user turn. Read the parent issue
      context via linear_graphql, then post a structured reply into the
      linked Slack thread via slack_api with chat.postMessage. Scan the
      thread first (conversations.replies) for any prior Pi reply that
      already covers this comment; if found, abort. Include the Linear
      comment author, a body excerpt, and a permalink back to Linear.

legacyRoutes:
  - name: help
    triggers:
      - "Slack app mention or DM text: help, help:, ?"
    status: legacy-active
    notes: Replies with the hard-coded Covent Pi command menu from index.mjs.

  - name: status
    triggers:
      - "Slack app mention or DM text: status, status:"
    status: legacy-active
    notes: Replies with bridge health/config from index.mjs.

  - name: summarize
    triggers:
      - "Slack app mention or DM prefix: summarize:"
    status: legacy-active
    notes: Pi prompt route for thread summary.

  - name: linear
    triggers:
      - "Slack app mention or DM prefix: linear:"
      - "Natural-language app mention asking to create/file/open a Linear issue or ticket"
    status: legacy-active
    notes: Pi prompt route that can create a Linear-ready issue spec and then create the Linear issue when configured.

  - name: agenda
    triggers:
      - "Slack app mention or DM prefix: agenda:"
    status: legacy-active
    notes: Pi prompt route for meeting agendas.

  - name: spec
    triggers:
      - "Slack app mention or DM prefix: spec:"
      - "Natural-language app mention asking to draft/write/create/make/generate a spec or PRD"
      - "Slash command: /thread-spec <Slack message/thread URL> [optional focus]"
    status: legacy-active
    notes: Pi prompt route for PRD/spec drafts; natural intent requires a thread.

  - name: app_mention
    triggers:
      - "Slack event: app_mention"
    status: legacy-active
    notes: Main public-channel entrypoint; dispatches help/status/prefix routes/natural intents/plain Pi requests.

  - name: direct_message
    triggers:
      - "Slack message event where channel_type is im and message is not a bot/subtype"
    status: legacy-active
    notes: DM entrypoint; dispatches help/status/prefix routes/plain Pi requests.
