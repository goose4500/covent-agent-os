# Agent Actions registry (pi-mom control plane)
#
# This file is the single source of truth for pi-mom Actions. The Slack
# dispatcher in apps/pi-mom/index.mjs resolves an inbound message to an
# Action key (`apps/pi-mom/lib/action-resolver.mjs#resolveAction`), then:
#   - builds a prompt that embeds the Action's `systemPromptSuffix:`
#     (`buildPiPrompt`) so the LLM sees the workflow-specific instruction.
#   - applies the Action's `tools:` allowlist by calling
#     `session.setActiveToolsByName(action.tools)` in
#     `apps/pi-mom/lib/pi-runtime.mjs#createSlackSession`.
# No extension-side metadata read is required.
#
# To add or change an Action, edit the `actions:` section below. The schema
# is enforced by `apps/pi-mom/lib/control-plane/registry-loader.mjs` and
# `apps/pi-mom/lib/action-resolver.mjs`. The legacy `legacyRoutes:` block
# that previously documented Slack-side handlers has been folded into the
# `actions:` entries below as of PR 2 of the pi-mom SDK migration.
#
# Fields per action:
#   key:                  stable kebab/lower-case identifier; matched
#                         against event.metadata.action
#   name:                 short human label
#   description:          one-sentence summary
#   status:               active | planned (active = dispatchable today)
#   riskLevel:            read-only | bounded | creative
#   approvalMode:         optional, human-readable
#   tools:                optional Pi tool allow-list (empty = host defaults)
#   systemPromptSuffix:   appended verbatim to the agent's system prompt
#   canvas:               whether to render a Slack canvas with the result
#   artifacts / sourceLinks: optional human-facing metadata
#   runtime:              required for active actions; type/entrypoint

version: 1

actions:
  - key: run-action
    name: Run Action
    description: Confirm and run a bounded agent Action from the control plane.
    status: active
    riskLevel: bounded
    approvalMode: Slack confirmation required before start
    artifacts:
      - Slack thread updates
      - Optional Slack canvas result
    sourceLinks:
      - Slack source thread
    runtime:
      type: control-plane
      entrypoint: run-action
      notes: "Existing agent: route maps to this active Action; execution behavior stays bounded by the configured runner."

  - key: repo-health
    name: Repo Health
    description: Inspect a configured repository worktree and summarize health signals.
    status: planned
    riskLevel: read-only
    approvalMode: Slack confirmation required before start
    artifacts:
      - Repository health summary
      - Slack thread updates
    sourceLinks:
      - Configured local worktree
    runtime:
      type: pi-mom-agent-runner
      entrypoint: repo-health
      notes: Existing legacy runner mode exists, but this Action is not active in the registry/runtime concept yet.

  - key: linear
    name: Create Linear issue
    description: Draft a Linear-ready issue spec from the current Slack thread; the bridge creates the issue afterwards.
    status: active
    riskLevel: bounded
    tools:
      - read
      - linear_*
    canvas: true
    runtime:
      type: pi-prompt
      entrypoint: linear
    systemPromptSuffix: |
      Create a Linear-ready issue spec from the current Slack thread. The first line must be exactly `Title: <concise issue title>`. Then write the issue description in Markdown with problem, context, proposed solution/spec, acceptance criteria, priority/severity suggestion, source Slack thread timestamp if inferable, and open questions. The bridge will create the Linear issue after you output this spec.

  - key: agenda
    name: Meeting agenda
    description: Turn the current Slack context into a structured meeting agenda.
    status: active
    riskLevel: read-only
    tools: []
    canvas: false
    runtime:
      type: pi-prompt
      entrypoint: agenda
    systemPromptSuffix: |
      Turn the current Slack context into a meeting agenda. Output: meeting goal, required decisions, agenda items, pre-reads/context, attendee-specific questions if inferable, and desired outcomes.

  - key: escalation
    name: Escalation brief
    description: Produce an escalation brief from the current Slack thread.
    status: active
    riskLevel: read-only
    tools: []
    canvas: true
    runtime:
      type: pi-prompt
      entrypoint: escalation
    systemPromptSuffix: |
      Create an escalation brief from the current Slack thread. Output: severity, customer/business impact, known facts, unknowns, blockers, recommended owner, immediate next action, and a concise suggested internal reply.

  - key: spec
    name: Spec / PRD draft
    description: Convert a Slack idea or context into a concise spec/PRD draft.
    status: active
    riskLevel: bounded
    tools: []
    canvas: true
    runtime:
      type: pi-prompt
      entrypoint: spec
    systemPromptSuffix: |
      Convert the Slack idea/context into a concise spec draft. Output: problem, user/customer, proposed solution, non-goals, success criteria, implementation notes, risks, validation plan, and open questions.

  - key: digest
    name: Digest
    description: Compact digest of important updates, decisions, asks, blockers, and follow-ups from Slack context.
    status: active
    riskLevel: read-only
    tools: []
    canvas: true
    runtime:
      type: pi-prompt
      entrypoint: digest
    systemPromptSuffix: |
      Create a compact digest from the available Slack context. Output: important updates, decisions, asks, blockers, follow-ups, and anything that needs an owner. If broader channel/date context is needed, say exactly what scope is missing.

  - key: agent
    name: Agent Run Card
    description: Show a Slack confirmation card before running a bounded fake or repo-health agent task.
    status: active
    riskLevel: bounded
    tools: []
    canvas: false
    runtime:
      type: pi-prompt
      entrypoint: agent
    systemPromptSuffix: |
      Show a Slack confirmation card before running a bounded fake or repo-health agent task.
