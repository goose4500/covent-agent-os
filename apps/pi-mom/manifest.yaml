_metadata:
  major_version: 2
  minor_version: 2
display_information:
  background_color: '#2E2B5F'
  description: Local Pi AI agent bridge for Covent Slack testing.
  long_description: Covent Pi is a local, human-in-the-loop AI agent bridge for testing Pi coding and research agents from Slack. It runs through Socket Mode, replies in threads, keeps tokens local, and starts with a small private-channel testing surface before broader rollout.
  name: Covent Pi
features:
  agent_view:
    agent_description: Covent Pi — internal cockpit for spec drafts, Linear filing, meeting agendas, thread summaries, and bounded Pi agent runs.
    suggested_prompts:
      - title: Draft a spec
        message: "spec: "
      - title: Create a Linear issue
        message: "linear: "
      - title: Meeting agenda
        message: "agenda: "
      - title: Summarize a thread
        message: "summarize: paste the thread URL or context"
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    always_online: true
    display_name: Covent Pi
  rich_previews:
    entity_types:
    - slack#/entities/content_item
    - slack#/entities/item
    - slack#/entities/task
    - slack#/entities/incident
    - slack#/entities/file
    is_active: true
  slash_commands:
  - command: /thread-spec
    description: Draft a spec from a Slack thread
    should_escape: false
oauth_config:
  pkce_enabled: false
  scopes:
    bot:
    - app_mentions:read
    - assistant:write
    - bookmarks:read
    - bookmarks:write
    - calls:read
    - calls:write
    - canvases:read
    - canvases:write
    - channels:history
    - channels:join
    - channels:manage
    - channels:read
    - chat:write
    - chat:write.customize
    - chat:write.public
    - commands
    - emoji:read
    - files:read
    - files:write
    - groups:history
    - groups:read
    - groups:write
    - im:history
    - im:read
    - im:write
    - incoming-webhook
    - links:read
    - links:write
    - metadata.message:read
    - mpim:history
    - mpim:read
    - mpim:write
    - pins:read
    - pins:write
    - reactions:read
    - reactions:write
    - remote_files:read
    - remote_files:share
    - remote_files:write
    - team:read
    - usergroups:read
    - usergroups:write
    - users.profile:read
    - users:read
    - users:read.email
    - users:write
    - workflow.steps:execute
settings:
  event_subscriptions:
    bot_events:
    - app_mention
    - app_home_opened
    - assistant_thread_context_changed
    - assistant_thread_started
    - message.im
  interactivity:
    is_enabled: true
  is_mcp_enabled: false
  org_deploy_enabled: true
  socket_mode_enabled: true
  token_rotation_enabled: false
