name: ci

# pull_request fires for ANY base (so stacked PRs against feature branches still
# get CI). push is restricted to main + foundation-v2 so post-merge runs are
# gated, but feature branches don't double-fire CI on every push (the open PR's
# pull_request event already covers it). concurrency cancels stale PR runs on
# force-push.
on:
  push:
    branches: [main, foundation-v2]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Check (lint, validators, typecheck, secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks-action needs full history to scan beyond the diff
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # tsc still runs under node; install node for the typecheck step only.
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Gitleaks (full history scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: bun run check (secret-scan + validators + typecheck + pi-mom tests)
        run: bun run check
