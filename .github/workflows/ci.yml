name: ci

# pull_request fires for ANY base (so stacked PRs against feature branches still
# get CI). push is restricted to main so post-merge runs are gated, but feature
# branches don't double-fire CI on every push (the open PR's pull_request event
# already covers it). concurrency cancels stale PR runs on force-push.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    name: Check (lint, validators, typecheck, secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks-action needs full history to scan beyond the diff
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps (workspaces)
        run: npm ci

      # Lockfile drift gate — apps/pi-mom has its own package-lock.json that
      # workspaces does NOT manage. `npm ci --prefix` errors if it has drifted.
      - name: Verify apps/pi-mom lockfile is in sync
        run: npm ci --prefix apps/pi-mom

      - name: Gitleaks (full history scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm run check (secret-scan + validators + typecheck)
        run: npm run check

  test-pi-ext-covent-aws:
    name: Test packages/pi-ext-covent-aws (bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install workspace deps
        run: npm ci

      - name: Typecheck
        working-directory: packages/pi-ext-covent-aws
        run: bun run typecheck

      - name: Test
        working-directory: packages/pi-ext-covent-aws
        run: bun test
