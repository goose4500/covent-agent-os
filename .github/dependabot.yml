version: 2
updates:
  # Root npm workspace — covers root deps and every workspace listed in the root
  # package.json "workspaces" array. apps/pi-mom keeps its own lockfile so it gets
  # a separate entry below.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      pi-stack:
        patterns: ["@mariozechner/*", "typebox", "jiti"]
      types:
        patterns: ["@types/*"]
        update-types: ["minor", "patch"]
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # apps/pi-mom has its own package-lock.json and is not covered by the root entry.
  - package-ecosystem: npm
    directory: /apps/pi-mom
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      slack:
        patterns: ["@slack/*"]
    labels: ["dependencies", "pi-mom"]
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
      include: scope
